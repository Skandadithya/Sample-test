<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best Friend Test</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:fixed;
}

#result{
    font-size:22px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Welcome My Best Friend ❤️</h1>
    <h2>Are you lucky to have me as a friend?</h2>

    <button id="yes" onclick="showMessage()">Yes 😄</button>
    <button id="no">No 😜</button>

    <div id="result"></div>
</div>

<script>

const noBtn = document.getElementById("no");

function moveButton(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// desktop
noBtn.addEventListener("mouseover", moveButton);

// mobile
noBtn.addEventListener("touchstart", moveButton);

function showMessage(){
    document.getElementById("result").innerHTML =
    "🎉 Yay! You are grateful that you got me as a friend! 🎉";
}

</script>

</body>
</html>
